<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошик - Vilka</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <!-- Навігація -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/image 1 (1).png" alt="LogikaShop" height="40">
            </a>

            <a href="index.html" class="btn btn-outline-light rounded-pill">
                <i class="bi bi-arrow-left"></i> До магазину
            </a>
        </div>
    </nav>

    <!-- Заголовок сторінки -->
    <div class="bg-dark text-white py-4 mb-4">
        <div class="container">
            <h1 class="mb-0">
                <i class="bi bi-cart3"></i> Кошик
            </h1>
        </div>
    </div>

    <!-- Основний контент -->
    <main class="container mb-5">
        <div class="row">
            <div class="col-12 col-lg-5">
                <!-- Товари в кошику -->
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0">
                            <i class="bi bi-bag"></i> Товари у кошику
                            <span class="badge bg-warning text-dark ms-2" id="cartItemsCount">0</span>
                        </h5>
                    </div>
                    <div class="card-body p-0" id="cartItems">
                        <!-- Товари будуть додані через JS -->

                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <strong class="fs-5">Всього:</strong>
                        <strong class="fs-5 text-success" id="totalPrice">0 грн</strong>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-7">
                <!-- Форма замовлення -->
                <div class="card shadow-sm border-0 mb-4" id="checkoutCard">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0">
                            <i class="bi bi-clipboard-check"></i> Оформлення
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="checkoutForm">
                            <div class="mb-3">
                                <label for="customerName" class="form-label">
                                    <i class="bi bi-person"></i> Ваше ім'я
                                </label>
                                <input type="text" class="form-control" id="customerName" required
                                    placeholder="Введіть ваше ім'я">
                            </div>
                            <div class="mb-3">
                                <label for="customerPhone" class="form-label">
                                    <i class="bi bi-telephone"></i> Телефон
                                </label>
                                <input type="tel" class="form-control" id="customerPhone" required
                                    placeholder="+380 XX XXX XX XX">
                            </div>
                            <div class="mb-3">
                                <label for="customerEmail" class="form-label">
                                    <i class="bi bi-envelope"></i> Email
                                </label>
                                <input type="email" class="form-control" id="customerEmail" required
                                    placeholder="your@email.com">
                            </div>
                            <div class="mb-3">
                                <label for="customerAddress" class="form-label">
                                    <i class="bi bi-geo-alt"></i> Адреса доставки
                                </label>
                                <textarea class="form-control" id="customerAddress" rows="2" required
                                    placeholder="Місто, вулиця, будинок"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-credit-card-2-front"></i> Спосіб оплати
                                </label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentMethod" id="paymentCash"
                                        value="cash" checked>
                                    <label class="form-check-label" for="paymentCash">
                                        <i class="bi bi-cash"></i> Готівкою при отриманні
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentMethod" id="paymentCard"
                                        value="card">
                                    <label class="form-check-label" for="paymentCard">
                                        <i class="bi bi-credit-card"></i> Карткою онлайн
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 btn-lg rounded-pill" id="submitOrder">
                                <i class="bi bi-check-circle"></i> Підтвердити замовлення
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        </div>
        </div>

    </main>

    <!-- Модальне вікно успішного замовлення -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center border-0 shadow">
                <div class="modal-body py-5">
                    <i class="bi bi-check-circle-fill text-success display-1"></i>
                    <h3 class="mt-4">Дякуємо за замовлення!</h3>
                    <p class="text-muted">Ми зв'яжемось з вами найближчим часом для підтвердження.</p>
                    <a href="index.html" class="btn btn-success btn-lg mt-3 rounded-pill">
                        <i class="bi bi-shop"></i> Повернутись до магазину
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container">
            <div class="row">
                <div class="col-md-6 mb-3 mb-md-0">
                    <img src="img/image 1 (1).png" alt="LogikaShop" height="40" class="mb-2">
                    <p class="text-white-50 small mb-0">Ваш надійний магазин електроніки</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-white-50 small mb-0">&copy; 2026 Vilka. Всі права захищені.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- GSAP для анімацій -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Cart JS -->
    <script src="app.js"></script>
</body>

</html>
